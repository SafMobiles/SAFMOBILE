<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Compare Specs - SAF Mobiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script>
    fetch('api/check_auth.php')
      .then(res => {
        if(res.status === 401) {
          window.location.replace('login.html');
          throw new Error('Unauthorized');
        }
        return res.json();
      })
      .then(data => {
        if(!data.authenticated) {
          window.location.replace('login.html');
        }
      })
      .catch(() => {
        window.location.replace('login.html');
      });
  </script>
</head>
<body id="page-compare">

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="mobile-sidebar">
    <div class="sidebar-header">
      <div class="logo-brand text-primary"><i class="fa-solid fa-mobile-screen"></i> SAF Mobiles</div>
    </div>
    <div class="sidebar-links">
      <a href="index.html" class="sidebar-link"><i class="fa-solid fa-house" style="width: 25px;"></i> Home</a>
      <a href="products.html" class="sidebar-link"><i class="fa-solid fa-compass" style="width: 25px;"></i> Explore</a>
      <a href="compare.html" class="sidebar-link active"><i class="fa-solid fa-code-compare" style="width: 25px;"></i> Compare specs</a>
      <a href="sell.html" class="sidebar-link"><i class="fa-solid fa-money-bill-wave" style="width: 25px;"></i> Sell Device</a>
    </div>
  </aside>

  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-left">
        <button class="icon-btn hamburger" id="hamburger-btn">
          <i class="fa-solid fa-bars"></i>
        </button>
        <a href="index.html" class="logo-brand">
          <img src="assets/images/logo.png" alt="SAF Logo"> SAF Mobiles
        </a>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-item">Home</a>
        <a href="products.html" class="nav-item">Explore</a>
        <a href="compare.html" class="nav-item active">Compare</a>
        <a href="sell.html" class="nav-item">Sell</a>
      </div>
      <div style="display: flex; gap: 10px;">
        <a href="cart.html" class="icon-btn">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="badge cart-badge" style="display: none;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="section-light" style="min-height: calc(100vh - 70px);">
    <div class="container">
      <h1 style="margin-bottom: var(--spacing-sm);">Compare Devices</h1>
      <p class="text-secondary" style="margin-bottom: var(--spacing-xl);">Evaluate specifications side-by-side to find the perfect fit.</p>
      
      <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-lg);">
        <button class="btn btn-primary" onclick="openCompareModal()" style="display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-plus"></i> Add Device</button>
      </div>
      
      <div style="border-radius: var(--border-radius-md); overflow-x: auto;">
        <!-- Filled deeply by app.js rendering table -->
        <div id="compare-table-container"></div>
      </div>
    </div>
  </div>

  <!-- Styled Modal for adding devices to compare -->
  <div class="modal-backdrop" id="compareModal" onclick="if(event.target === this) closeModal('compareModal')">
    <div class="modal-content">
      <div class="modal-header">
        <h2 style="margin: 0; font-size: 1.25rem;">Select Device</h2>
        <button class="icon-btn" onclick="closeModal('compareModal')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modal-device-list" style="display: grid; gap: 10px;">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
