<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Your Cart - SAF Mobiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script>
    fetch('api/check_auth.php')
      .then(res => {
        if(res.status === 401) {
          window.location.replace('login.html');
          throw new Error('Unauthorized');
        }
        return res.json();
      })
      .then(data => {
        if(!data.authenticated) {
          window.location.replace('login.html');
        }
      })
      .catch(() => {
        window.location.replace('login.html');
      });
  </script>
</head>
<body id="page-cart">

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="mobile-sidebar">
    <div class="sidebar-header">
      <div class="logo-brand text-primary"><i class="fa-solid fa-mobile-screen"></i> SAF Mobiles</div>
    </div>
    <div class="sidebar-links">
      <a href="index.html" class="sidebar-link"><i class="fa-solid fa-house" style="width: 25px;"></i> Home</a>
      <a href="products.html" class="sidebar-link"><i class="fa-solid fa-compass" style="width: 25px;"></i> Explore</a>
      <a href="compare.html" class="sidebar-link"><i class="fa-solid fa-code-compare" style="width: 25px;"></i> Compare specs</a>
      <a href="sell.html" class="sidebar-link"><i class="fa-solid fa-money-bill-wave" style="width: 25px;"></i> Sell Device</a>
    </div>
  </aside>

  <nav class="navbar">
    <div class="container nav-container">
      <div class="nav-left">
        <button class="icon-btn hamburger" id="hamburger-btn">
          <i class="fa-solid fa-bars"></i>
        </button>
        <a href="index.html" class="logo-brand">
          <img src="assets/images/logo.png" alt="SAF Logo"> SAF Mobiles
        </a>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-item">Home</a>
        <a href="products.html" class="nav-item">Explore</a>
        <a href="compare.html" class="nav-item">Compare</a>
        <a href="sell.html" class="nav-item">Sell</a>
      </div>
      <div style="display: flex; gap: 10px;">
        <a href="cart.html" class="icon-btn">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="badge cart-badge" style="display: none;">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="section-grey" style="min-height: calc(100vh - 70px);">
    <div class="container">
      <h1 style="margin-bottom: var(--spacing-xl);">Shopping Cart</h1>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--spacing-xl); align-items: start;">
        
        <div id="cart-items-container" style="flex: 2;"></div>
        
        <div style="background: var(--surface-color); padding: var(--spacing-lg); border-radius: var(--border-radius-lg); border: 1px solid var(--border-color); flex: 1;">
          <h2 style="font-size: 1.25rem; margin-bottom: var(--spacing-md); padding-bottom: var(--spacing-sm); border-bottom: 1px solid var(--border-color);">Order Summary</h2>
          
          <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-secondary);">
            <span>Subtotal</span>
            <span id="cart-subtotal" class="text-primary text-bold">$0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-secondary);">
            <span>Shipping</span>
            <span class="text-secondary" style="color: var(--secondary-color);">Free</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 24px; padding-top: 12px; border-top: 1px dashed var(--border-color);">
            <strong style="font-size: 1.25rem;">Total</strong>
            <strong id="cart-total" class="text-primary" style="font-size: 1.5rem;">$0.00</strong>
          </div>
          
          <button id="checkout-btn" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; gap: 8px;">
            Secure Checkout <i class="fa-solid fa-lock"></i>
          </button>
          
          <div style="text-align: center; margin-top: 16px;">
            <p class="text-xs text-secondary">Free shipping on orders over $500. 30-day returns.</p>
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
